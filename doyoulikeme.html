<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoYouLikeMe</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: linear-gradient(180deg, rgba(251, 207, 232, 0.88), rgba(146, 180, 255, 0.92)),
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.45), transparent 22%),
                url('her_images/cropped.jpg');
            background-size: cover, cover, cover;
            background-position: center;
            overflow: hidden;
            color: white;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 25, 0.45);
            pointer-events: none;
            z-index: 0;
            backdrop-filter: blur(10px);
        }

        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .card {
            width: min(620px, 100%);
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 30px 80px rgba(10, 15, 40, 0.35);
            backdrop-filter: blur(18px);
            text-align: center;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: radial-gradient(circle at top right, rgba(255, 255, 255, 0.14), transparent 32%);
            pointer-events: none;
            transform: translateX(-25%);
        }

        .card h1 {
            font-size: clamp(2.4rem, 4vw, 3.5rem);
            letter-spacing: 0.02em;
            line-height: 1.05;
            margin-bottom: 18px;
        }

        .card p {
            font-size: 1.05rem;
            opacity: 0.92;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .button-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 18px;
        }

        .yes,
        .no {
            min-width: 140px;
            border: none;
            border-radius: 999px;
            padding: 14px 26px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: white;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
            position: relative;
            overflow: hidden;
        }

        .yes {
            background: linear-gradient(135deg, #ff6eb4, #ff9a96);
            transition: 0.3s all ;
        }

        .no {
            background: linear-gradient(135deg, #ff5f7a, #ff904d);
        }

        .yes:hover,
        .no:hover {
            transform: translateY(-3px) scale(1.02);
        }

        .yes:active,
        .no:active {
            transform: translateY(-1px) scale(0.98);
        }

        .note {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-top: 12px;
            color: #f9f6ff;
        }

        .photo-glow {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 140px;
            height: 140px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(255, 120, 180, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.22);
            animation: float 8s ease-in-out infinite;
        }

        .photo-glow img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) translateX(0);
            }

            50% {
                transform: translateY(-10px) translateX(6px);
            }
        }

        #confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 640px) {
            .card {
                padding: 28px 22px;
            }

            .button-row {
                gap: 14px;
            }

            .photo-glow {
                width: 110px;
                height: 110px;
                bottom: 18px;
                right: 18px;
            }
        }

        #herimg {
            transform: rotate(-90deg);
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="card">
            <h1>Do You Like Me?</h1>
            <p>One click and I will be the happiest person alive. I promise this page is made just for you 💕</p>

            <div class="button-row">
                <button class="yes">Yes, of course 💖</button>
                <button class="no">No, maybe later 😢</button>
            </div>

            <p class="note">haa karde nhi to pachtayegi...</p>
        </div>

        <div class="photo-glow">
            <img src="her_images/cropped.jpg" id="herimg" alt="Special memory" />
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>

        let text1 = document.querySelector("h1");
        let text2 = document.querySelector("p");
        let note = document.querySelector(".note")

        let nobtn = document.querySelector(".no");
        let yesbtn = document.querySelector(".yes");

        yesbtn.addEventListener("click", yes);

        function yes() {

            text1.innerHTML = "Love you too meri jannn 💖💖";

            text2.innerHTML = "mujhe to pehle hi pata thaaa....";

            yesbtn.style.display = "none";
            note.style.display = "none"
            nobtn.style.display = "none";

            startConfetti();
        }

        let clickCount = 0;

        nobtn.style.transition = "0.2s";

        nobtn.addEventListener("click", () => {

            clickCount++;

            if (clickCount === 1) {

                text2.innerHTML = " thoda sa bhi nhi ???? 😰 ";

            }

            else if (clickCount === 2) {

                text2.innerHTML = " thoda sa to karti hi hogi 😘";

            }

            else if (clickCount === 3) {

                text2.innerHTML = " ek aur baar sochle 🤔";

            }

            else if (clickCount === 4) {

                text2.innerHTML = "{ koi krishna, sourav, karan, vicky itna nhi sochega tere bare me!! 🫢 }";

            }

            else if (clickCount === 5) {

                text2.innerHTML = " Last Chance 😅";
            }
            else if (clickCount === 6) {

                note.innerHTML = "ab to haa karna hi padega 😆";
                nobtn.style.display = "none"
            }

        });



        // CONFETTI

        const canvas = document.getElementById("confetti");

        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;

        canvas.height = window.innerHeight;

        const pieces = [];

        function randomColor() {

            const colors = [
                "#ff4d6d",
                "#ffd166",
                "#06d6a0",
                "#118ab2",
                "#f72585"
            ];

            return colors[Math.floor(Math.random() * colors.length)];
        }

        function createPiece() {

            return {
                x: Math.random() * canvas.width,
                y: Math.random() * -canvas.height,
                size: Math.random() * 10 + 5,
                speed: Math.random() * 3 + 2,
                color: randomColor(),
                rotation: Math.random() * 360
            };
        }

        function startConfetti() {

            for (let i = 0; i < 250; i++) {

                pieces.push(createPiece());

            }

            animateConfetti();
        }

        function animateConfetti() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            pieces.forEach((p, index) => {

                p.y += p.speed;

                p.rotation += 2;

                ctx.save();

                ctx.translate(p.x, p.y);

                ctx.rotate(p.rotation * Math.PI / 180);

                ctx.fillStyle = p.color;

                ctx.fillRect(
                    -p.size / 2,
                    -p.size / 2,
                    p.size,
                    p.size
                );

                ctx.restore();

                if (p.y > canvas.height) {

                    pieces.splice(index, 1);

                }

            });

            requestAnimationFrame(animateConfetti);
        }

        window.addEventListener("resize", () => {

            canvas.width = window.innerWidth;

            canvas.height = window.innerHeight;

        });

    </script>

</body>

</html>
